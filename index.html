<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jaideep Films</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
}

/* NAVBAR */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 1px;
  transition: 0.3s;
}

nav a:hover {
  color: #aaa;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #000, #111);
  text-align: center;
}

header h1 {
  font-size: 70px;
}

header p {
  color: #aaa;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #fff;
  color: #000;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #ddd;
}

/* SECTION */
section {
  padding: 100px 20px;
  max-width: 1100px;
  margin: auto;
  text-align: center;
}

/* SOCIAL */
.social a {
  margin: 10px;
  display: inline-block;
  color: #fff;
  text-decoration: none;
  border: 1px solid #333;
  padding: 10px 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.social a:hover {
  background: #fff;
  color: #000;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a href="#">HOME</a>
  <a href="projects.html">FILMS</a>
  <a href="contact.html">CONTACT</a>
  <a href="#social">SOCIAL</a>
</nav>

<!-- HERO -->
<header>
  <h1>JAIDEEP FILMS</h1>
  <p>Cinematic Storytelling • Visual Emotion • Creative Direction</p>
  <a href="projects.html" class="btn">Explore Films</a>
</header>

<!-- ABOUT -->
<section>
  <h2>About Me</h2>
  <p>
    Filmmaker passionate about creating cinematic visuals and powerful storytelling.
  </p>
</section>

<!-- SOCIAL MEDIA -->
<section id="social">
  <h2>Connect With Me</h2>
  <div class="social">
    <a href="#">Instagram</a>
    <a href="#">YouTube</a>
    <a href="#">LinkedIn</a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 Jaideep Films
</footer>

</body>
</html>
