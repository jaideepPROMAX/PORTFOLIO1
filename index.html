<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jaideep Films</title>

  <link rel="stylesheet" href="style.css">

</head>

  <link rel="stylesheet" href="style.css">

</head>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: #fff;
}

/* GLASS EFFECT */
.glass {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* NAVBAR */
nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 30px;
  display: flex;
  gap: 30px;
  z-index: 1000;
}

nav a {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.8;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-box {
  padding: 60px;
  text-align: center;
  max-width: 600px;
}

.hero-box h1 {
  font-size: 60px;
  margin: 0;
}

.hero-box p {
  color: #aaa;
  margin-top: 10px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  color: #fff;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.3);
}

/* SECTION */
section {
  padding: 80px 20px;
  text-align: center;
}

/* SOCIAL */
.social a {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  border-radius: 12px;
  text-decoration: none;
  color: #fff;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.social a:hover {
  background: rgba(255,255,255,0.2);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="glass">
  <a href="#">Home</a>
  <a href="projects.html">Films</a>
  <a href="contact.html">Contact</a>
  <a href="social.html">Social</a>
</nav>

<!-- HERO -->
<header>
  <div class="hero-box glass">
    <h1>Jaideep Films</h1>
    <p>Cinematic Storytelling • Visual Emotion</p>
    <a href="projects.html" class="btn">Explore Films</a>
  </div>
</header>

<!-- ABOUT -->
<section>
  <div class="glass" style="padding:40px; max-width:700px; margin:auto;">
    <h2>About Me</h2>
    <p style="color:#aaa;">
      Filmmaker crafting cinematic visuals and storytelling experiences.
    </p>
  </div>
</section>

<!-- SOCIAL -->
<section>
  <h2>Connect</h2>
  <div class="social">
    <a href="https://www.instagram.com/jaideep_creates/" target="_blank">Instagram (Work)</a>
    <a href="https://www.instagram.com/jaideepeemani/" target="_blank">Instagram (Personal)</a>
    <a href="https://www.youtube.com/@jaideep_creates" target="_blank">YouTube</a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 Jaideep Films
</footer>

</body>
</html>
