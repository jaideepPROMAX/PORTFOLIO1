<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects | Jaideep Films</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      color: #aaa;
    }

    .projects {
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255,255,255,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 8px;
    }

    .card p {
      color: #aaa;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #fff;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>My Projects</h1>
    <p>Explore my cinematic works 🎥</p>
  </header>

  <!-- Projects Grid -->
  <section class="projects">

    <!-- Project 1 -->
    <div class="card">
      <img src="https://via.placeholder.com/400x250" alt="MRTA">
      <div class="card-content">
        <h3>MRTA</h3>
        <p>Short Film exploring emotion and storytelling.</p>
        <a href="#" class="btn">Watch</a>
      </div>
    </div>

    <!-- Project 2 -->
    <div class="card">
      <img src="https://via.placeholder.com/400x250" alt="Project 2">
      <div class="card-content">
        <h3>Cinematic Reel</h3>
        <p>High-quality visual storytelling shots.</p>
        <a href="#" class="btn">Watch</a>
      </div>
    </div>

    <!-- Project 3 -->
    <div class="card">
      <img src="https://via.placeholder.com/400x250" alt="Project 3">
      <div class="card-content">
        <h3>Creative Ad</h3>
        <p>Product-style cinematic advertisement.</p>
        <a href="#" class="btn">Watch</a>
      </div>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    © 2026 Jaideep Films
  </footer>

</body>
</html>
